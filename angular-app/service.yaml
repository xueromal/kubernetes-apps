apiVersion: v1
kind: Service
metadata:
  name: angular-app
  namespace: angular-app
spec:
  selector:
    app: angular-app
  type: LoadBalancer
  ports:
    - name: angular-app-port
      protocol: TCP
      port: 4200
      targetPort: 4200
  externalIPs:
    - 192.168.4.102
  loadBalancerIP: 192.168.0.209
