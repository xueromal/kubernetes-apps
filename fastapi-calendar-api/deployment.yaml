---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: fastapi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fastapi-app
    spec:
      containers:
      - image: 192.168.5.115:5000/fastapi-calendar-api:0.5
        name: fastapi-app
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
          protocol: TCP
          name: fastapi-app
