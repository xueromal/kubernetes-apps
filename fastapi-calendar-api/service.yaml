apiVersion: v1
kind: Service
metadata:
  name: fastapi-app
  namespace: fastapi-app
spec:
  selector:
    app: fastapi-app
  type: LoadBalancer
  ports:
    - name: fastapi-app-port
      protocol: TCP
      port: 8000
      targetPort: 8000
  externalIPs:
    - 192.168.4.102
  loadBalancerIP: 192.168.0.209
