apiVersion: v1
kind: Service
metadata:
  name: angular-calendar
  namespace: angular-calendar
spec:
  selector:
    app: angular-calendar
  type: LoadBalancer
  ports:
    - name: ang-cal-port
      protocol: TCP
      port: 4200
      targetPort: 4200
  externalIPs:
    - 192.168.4.102
  loadBalancerIP: 192.168.0.209
